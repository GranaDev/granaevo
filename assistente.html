<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <!-- Captura do beforeinstallprompt PRIMEIRO de tudo, SEM defer: em visitas
       repetidas (SW ja em cache) o Chrome dispara o evento cedo; se o listener
       vier depois (defer/modulo), o prompt se perde e o botao Baixar nao instala.
       Precisa vir antes do manifesto pra o listener ja existir quando disparar. -->
  <script src="/pwa-init.js"></script>
  <meta name="theme-color" content="#0a0b14">
  <meta name="robots" content="noindex, nofollow">
  <title>Assistente GranaEvo</title>
  <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
  <!-- Manifesto próprio: instala como app que abre direto no /assistente -->
  <link rel="manifest" href="/assistente.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/pwa-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Assistente GranaEvo">
  <link rel="stylesheet" href="src/styles/assistente.css">
</head>
<body>
  <main class="ge-chat">
    <header class="ge-header">
      <button class="ge-icon-btn" id="geBack" type="button" title="Voltar ao dashboard" aria-label="Voltar ao dashboard" hidden><i class="fas fa-arrow-left" aria-hidden="true"></i></button>
      <div class="ge-avatar" aria-hidden="true"><i class="fas fa-comment-dots"></i></div>
      <div class="ge-header-info">
        <div class="ge-header-title">Assistente GranaEvo</div>
        <div class="ge-header-status">online</div>
        <div class="ge-header-profile" id="geHeaderProfile"></div>
      </div>
      <button class="ge-icon-btn" id="geSearch" type="button" title="Buscar na conversa" aria-label="Buscar na conversa" hidden><i class="fas fa-magnifying-glass" aria-hidden="true"></i></button>
      <button class="ge-icon-btn" id="geInstall" type="button" title="Baixar assistente" aria-label="Baixar assistente" hidden><i class="fas fa-download" aria-hidden="true"></i></button>
      <button class="ge-icon-btn" id="geSettings" type="button" title="Configurações" aria-label="Configurações"><i class="fas fa-gear" aria-hidden="true"></i></button>
    </header>

    <div class="ge-messages" id="geMessages" role="log" aria-live="polite" aria-label="Conversa"></div>

    <div class="ge-quickbar" id="geQuick" role="group" aria-label="Sugestões" hidden></div>

    <div class="ge-inputbar">
      <textarea class="ge-input" id="geInput" rows="1" placeholder="Ex: gastei 80 no mercado" autocomplete="off" autocapitalize="sentences" enterkeyhint="send"></textarea>
      <button class="ge-send" id="geSend" type="button" aria-label="Enviar" disabled><i class="fas fa-paper-plane" aria-hidden="true"></i></button>
    </div>
  </main>

  <div class="ge-overlay" id="geOverlay" hidden>
    <div class="ge-sheet" id="geSheet" role="dialog" aria-modal="true"></div>
  </div>

  <script type="module" src="src/scripts/pages/assistente.js?v=1"></script>
</body>
</html>
