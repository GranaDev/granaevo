<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
    <title>Termos de Uso — GranaEvo</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()">

    <!-- CSP definida via HTTP header em vercel.json -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #060810 0%, #0d1117 55%, #060c14 100%);
            min-height: 100svh;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 40px 36px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
            text-decoration: none;
        }
        .brand-name {
            font-size: 20px;
            font-weight: 900;
            color: #10b981;
            letter-spacing: -0.5px;
        }

        .icon-wrap {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(16,185,129,0.08);
            border: 1.5px solid rgba(16,185,129,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .icon-wrap svg { width: 28px; height: 28px; color: #10b981; }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: border-color 0.2s, color 0.2s;
        }
        .links a:hover { border-color: rgba(16,185,129,0.4); color: #10b981; }
        .links a svg { width: 13px; height: 13px; flex-shrink: 0; }

        .check-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            cursor: pointer;
        }
        .check-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            margin-top: 1px;
            accent-color: #10b981;
            cursor: pointer;
        }
        .check-label {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.6;
            cursor: pointer;
            user-select: none;
        }
        .check-label a { color: #10b981; text-decoration: none; }
        .check-label a:hover { text-decoration: underline; }

        .btn-accept {
            display: block;
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .btn-accept:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-accept:not(:disabled):hover { opacity: 0.92; }

        .error-msg {
            margin-top: 14px;
            font-size: 13px;
            color: #f87171;
            text-align: center;
            min-height: 20px;
        }

        #loading {
            text-align: center;
            padding: 40px 0;
            color: #64748b;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .card { padding: 28px 20px; border-radius: 16px; }
        }
    </style>
</head>
<body>

    <div class="card" role="main">

        <a href="dashboard.html" class="brand" aria-label="GranaEvo — Gestão Financeira">
            <img src="/assets/icons/granaevo-logo.jpg" alt="" width="34" height="34"
                 style="border-radius:8px;">
            <span class="brand-name">GranaEvo</span>
        </a>

        <!-- Spinner enquanto verifica sessão -->
        <div id="loading" aria-live="polite">Verificando sessão…</div>

        <!-- Formulário de aceite (oculto até verificar sessão) -->
        <div id="content" hidden>

            <div class="icon-wrap" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <path d="M14 3v5h5M9 12h6M9 16h4"/>
                </svg>
            </div>

            <h1>Termos de Uso atualizados</h1>
            <p class="subtitle">
                Para continuar usando o GranaEvo, confirme que leu e aceita nossos
                Termos de Uso e Política de Privacidade vigentes. Este registro
                é necessário para conformidade com a LGPD.
            </p>

            <div class="links" aria-label="Documentos legais">
                <a href="termos.html" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>
                    Termos de Uso
                </a>
                <a href="privacidade.html" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Política de Privacidade
                </a>
            </div>

            <label class="check-row" for="chkTerms">
                <input type="checkbox" id="chkTerms" name="chkTerms">
                <span class="check-label">
                    Li e aceito os
                    <a href="termos.html" target="_blank" rel="noopener noreferrer">Termos de Uso</a>
                    e a
                    <a href="privacidade.html" target="_blank" rel="noopener noreferrer">Política de Privacidade</a>
                    do GranaEvo.
                </span>
            </label>

            <button type="button" id="btnAccept" class="btn-accept" disabled>
                Aceitar e continuar
            </button>

            <p class="error-msg" id="errorMsg" aria-live="assertive" role="alert"></p>

        </div>

    </div>

    <script type="module" src="src/scripts/pages/aceitar-termos.js"></script>
</body>
</html>
