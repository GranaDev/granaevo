<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
    <title>Primeiro Acesso — GranaEvo</title>

    <!--
        CSP: sem 'unsafe-inline' em style-src.
        Todos os estilos são classes CSS — nenhum style="" inline no HTML.
        Polyfill de modulepreload desativado no vite.config.js (evita data: URI scripts).
        CSP principal via vercel.json HTTP headers; este meta é fallback para dev local.
    -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self';
        style-src 'self' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self'
            https://fvrhqqeofqedmhadzzqw.supabase.co
            wss://fvrhqqeofqedmhadzzqw.supabase.co;
        img-src 'self' data:;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
        block-all-mixed-content;
    ">

    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy"
          content="camera=(), microphone=(), geolocation=(), payment=(), usb=()">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/primeiroacesso.css">
</head>

<body>

    <!-- Fundo decorativo — puramente visual -->
    <div class="bg-glow" aria-hidden="true"></div>

    <main class="page-wrap">
        <div class="card">

            <!-- Honeypot: [CSP-FIX] classe .ge-hp substitui style inline bloqueado pela CSP -->
            <div class="ge-hp" aria-hidden="true" tabindex="-1">
                <input type="text"  id="_ge_hp_email" name="confirm_email" autocomplete="off" tabindex="-1">
                <input type="url"   id="_ge_hp_url"   name="website"       autocomplete="off" tabindex="-1">
            </div>

            <!-- Marca -->
            <div class="brand">
                <img src="/assets/icons/granaevo-logo.jpg"
                     alt="GranaEvo"
                     class="brand-logo"
                     width="44" height="44">
                <span class="brand-name">GranaEvo</span>
            </div>

            <!-- Indicador de etapas -->
            <div class="steps" aria-label="Progresso do cadastro">
                <div class="step-item" id="stepItem1">
                    <div class="step-dot"><span>1</span></div>
                    <span class="step-label">Email</span>
                </div>
                <div class="step-track" aria-hidden="true">
                    <div class="step-track-fill" id="stepTrackFill"></div>
                </div>
                <div class="step-item" id="stepItem2">
                    <div class="step-dot"><span>2</span></div>
                    <span class="step-label">Senha</span>
                </div>
            </div>

            <!-- Alerta global -->
            <div id="alertBox"
                 class="alert-box"
                 role="alert"
                 aria-live="assertive"
                 aria-atomic="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <div class="alert-content">
                    <p id="alertMessage"></p>
                </div>
            </div>

            <!-- Formulário -->
            <form id="accessForm" novalidate>

                <!-- ── ETAPA 1: Verificar email ── -->
                <div id="emailCheckState" class="email-check-state">
                    <h1 class="card-title">Criar sua senha</h1>
                    <p class="card-sub">Digite o email usado na compra para verificar seu acesso.</p>

                    <div class="form-group">
                        <label for="email">Email da compra</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="seu@email.com"
                            autocomplete="email"
                            maxlength="254"
                            required
                            aria-required="true"
                            spellcheck="false"
                        >
                    </div>

                    <button type="button" id="checkEmailBtn" class="btn">
                        <span class="btn-text">Verificar email</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>

                <!-- ── ETAPA 2: Criar senha ── -->
                <div id="passwordInputs" class="password-inputs">

                    <!-- Chip de email verificado -->
                    <div id="infoBox" class="info-box" role="status" aria-live="polite">
                        <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <div class="info-text">
                            <span class="info-label">Conta verificada</span>
                            <strong id="userEmail" class="info-email"></strong>
                        </div>
                        <svg class="info-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                    </div>

                    <!-- Dados acessíveis ao JS (ocultos visualmente) -->
                    <span id="userName" class="sr-only"></span>
                    <span id="planName" class="sr-only"></span>

                    <!-- Aviso de termos (aparece ao tentar submeter sem aceitar) -->
                    <div id="termsWarning" class="terms-warning" role="alert" aria-atomic="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                            <line x1="12" y1="9" x2="12" y2="13"/>
                            <line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                        <p>Aceite os <strong>Termos de Uso</strong> antes de continuar.</p>
                    </div>

                    <!-- Campo: nova senha -->
                    <div class="form-group">
                        <label for="password">Nova senha</label>
                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Mínimo 10 caracteres"
                                autocomplete="new-password"
                                maxlength="128"
                                required
                                aria-required="true"
                                aria-describedby="strengthText"
                            >
                            <button type="button" id="togglePassword1" class="toggle-password" aria-label="Mostrar ou ocultar senha">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <div class="password-strength" aria-live="polite">
                            <div class="strength-bar" aria-hidden="true">
                                <div id="strengthFill" class="strength-fill"></div>
                            </div>
                            <span id="strengthText" class="helper-text">Mínimo 10 caracteres</span>
                        </div>
                    </div>

                    <!-- Campo: confirmar senha -->
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar senha</label>
                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="confirmPassword"
                                name="confirmPassword"
                                placeholder="Repita a senha"
                                autocomplete="new-password"
                                maxlength="128"
                                required
                                aria-required="true"
                                aria-describedby="confirmError"
                            >
                            <button type="button" id="togglePassword2" class="toggle-password" aria-label="Mostrar ou ocultar confirmação de senha">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <div id="confirmError" class="error-text" role="alert" aria-live="polite">
                            As senhas não coincidem.
                        </div>
                    </div>

                    <!-- Termos de uso (LGPD/GDPR) -->
                    <div class="form-group">
                        <div class="checkbox-wrapper">
                            <input
                                type="checkbox"
                                id="termsCheckbox"
                                name="terms"
                                class="checkbox-input"
                                required
                                aria-required="true"
                                aria-describedby="termsError"
                            >
                            <label for="termsCheckbox" class="checkbox-label">
                                Li e aceito os
                                <a href="termos.html" target="_blank" rel="noopener noreferrer nofollow" class="terms-link">Termos de Uso</a>
                                e a
                                <a href="privacidade.html" target="_blank" rel="noopener noreferrer nofollow" class="terms-link">Política de Privacidade</a>
                            </label>
                        </div>
                        <div id="termsError" class="error-text" role="alert" aria-live="polite">
                            Aceite os termos para criar sua conta.
                        </div>
                    </div>

                    <!-- Botão de submit -->
                    <button type="submit" id="submitBtn" class="btn">
                        <span class="btn-text">Criar conta e acessar</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                    </button>

                </div><!-- /#passwordInputs -->

            </form>

            <!-- Rodapé -->
            <footer class="card-footer">
                <p>Já tem conta? <a href="login.html" class="footer-link">Fazer login</a></p>
                <p><a href="mailto:suporte@granaevo.com" rel="noopener noreferrer" class="footer-link-muted">suporte@granaevo.com</a></p>
            </footer>

        </div><!-- /.card -->
    </main><!-- /.page-wrap -->

    <script type="module" src="src/scripts/pages/primeiroacesso.js?v=4"></script>

</body>
</html>
